<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#6C63FF">
<title>Task Manager</title>
<link rel="manifest" href="manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --primary: #6C63FF;
  --primary-light: #8B85FF;
  --bg: #F5F5FA;
  --card: #FFFFFF;
  --text: #2D2D3A;
  --text-light: #8E8EA0;
  --danger: #FF6B6B;
  --success: #51CF66;
  --warning: #FFD43B;
  --border: #E8E8F0;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 80px;
  -webkit-tap-highlight-color: transparent;
}

/* Header */
.header {
  background: var(--primary);
  color: white;
  padding: 16px 20px 12px;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(108,99,255,0.3);
}
.header h1 { font-size: 20px; font-weight: 700; }
.header-row { display: flex; justify-content: space-between; align-items: center; }
.header .date-display { font-size: 13px; opacity: 0.85; margin-top: 2px; }

/* Tabs */
.tabs {
  display: flex;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 62px;
  z-index: 99;
}
.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-light);
  border: none;
  background: none;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.2s;
}
.tab.active { color: var(--primary); border-bottom-color: var(--primary); }

/* Calendar */
.calendar-container { padding: 12px; }
.calendar-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 8px 4px 12px;
}
.calendar-nav button {
  background: none;
  border: none;
  font-size: 22px;
  color: var(--primary);
  cursor: pointer;
  padding: 4px 12px;
}
.calendar-nav .month-year { font-size: 16px; font-weight: 700; }

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 2px;
}
.calendar-grid .day-name {
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-light);
  padding: 4px;
  text-transform: uppercase;
}
.calendar-grid .day {
  text-align: center;
  padding: 10px 4px;
  font-size: 14px;
  border-radius: 10px;
  cursor: pointer;
  position: relative;
  transition: all 0.15s;
}
.calendar-grid .day:active { transform: scale(0.92); }
.calendar-grid .day.other-month { color: var(--text-light); opacity: 0.4; }
.calendar-grid .day.today { background: var(--primary); color: white; font-weight: 700; }
.calendar-grid .day.selected { outline: 2px solid var(--primary); outline-offset: -2px; }
.calendar-grid .day.today.selected { outline-color: white; }
.calendar-grid .day .dot {
  position: absolute;
  bottom: 3px;
  left: 50%;
  transform: translateX(-50%);
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--primary);
}
.calendar-grid .day.today .dot { background: white; }

/* Task list */
.task-section { padding: 0 16px; }
.section-title {
  font-size: 13px;
  font-weight: 700;
  color: var(--text-light);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  padding: 16px 0 8px;
}

.task-card {
  background: var(--card);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 8px;
  box-shadow: var(--shadow);
  display: flex;
  align-items: flex-start;
  gap: 12px;
  transition: all 0.2s;
  animation: slideIn 0.25s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.task-card.done { opacity: 0.5; }
.task-card.done .task-title { text-decoration: line-through; }

.task-check {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 2px solid var(--border);
  flex-shrink: 0;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-top: 1px;
  transition: all 0.2s;
}
.task-check.checked {
  background: var(--success);
  border-color: var(--success);
}
.task-check.checked::after {
  content: '';
  width: 6px;
  height: 10px;
  border: solid white;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg) translate(-1px, -1px);
}

.task-info { flex: 1; min-width: 0; }
.task-title { font-size: 15px; font-weight: 600; word-break: break-word; }
.task-meta { font-size: 12px; color: var(--text-light); margin-top: 3px; display: flex; gap: 10px; align-items: center; }

.priority-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.priority-dot.high { background: var(--danger); }
.priority-dot.medium { background: var(--warning); }
.priority-dot.low { background: var(--success); }

.task-delete {
  background: none;
  border: none;
  color: var(--text-light);
  font-size: 18px;
  cursor: pointer;
  padding: 4px;
  opacity: 0.5;
}

/* Empty state */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text-light);
}
.empty-state .icon { font-size: 48px; margin-bottom: 12px; }
.empty-state p { font-size: 14px; }

/* FAB */
.fab {
  position: fixed;
  bottom: 24px;
  right: 20px;
  width: 56px;
  height: 56px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 50%;
  font-size: 28px;
  cursor: pointer;
  box-shadow: 0 4px 16px rgba(108,99,255,0.4);
  z-index: 200;
  transition: transform 0.2s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.fab:active { transform: scale(0.9); }

/* Modal */
.modal-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4);
  z-index: 300;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}
.modal-overlay.active { opacity: 1; pointer-events: all; }

.modal {
  background: var(--card);
  width: 100%;
  max-width: 500px;
  border-radius: 20px 20px 0 0;
  padding: 24px 20px 32px;
  transform: translateY(100%);
  transition: transform 0.3s ease;
}
.modal-overlay.active .modal { transform: translateY(0); }

.modal h2 { font-size: 18px; margin-bottom: 20px; }
.modal label { display: block; font-size: 13px; font-weight: 600; color: var(--text-light); margin-bottom: 6px; margin-top: 14px; }
.modal input, .modal select, .modal textarea {
  width: 100%;
  padding: 12px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 15px;
  font-family: inherit;
  background: var(--bg);
  color: var(--text);
  outline: none;
  transition: border-color 0.2s;
}
.modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--primary); }
.modal textarea { resize: vertical; min-height: 60px; }

.priority-select {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}
.priority-btn {
  flex: 1;
  padding: 10px;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  background: var(--bg);
  text-align: center;
  transition: all 0.2s;
}
.priority-btn.active-high { background: #FFF0F0; border-color: var(--danger); color: var(--danger); }
.priority-btn.active-medium { background: #FFF9E0; border-color: #F0C000; color: #C09000; }
.priority-btn.active-low { background: #F0FFF0; border-color: var(--success); color: #2B8A3E; }

.modal-actions {
  display: flex;
  gap: 10px;
  margin-top: 24px;
}
.btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: 12px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: white; }
.btn-secondary { background: var(--bg); color: var(--text); }

/* View: all tasks */
.view { display: none; }
.view.active { display: block; }

/* Filter chips */
.filter-row {
  display: flex;
  gap: 8px;
  padding: 12px 16px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.filter-row::-webkit-scrollbar { display: none; }
.chip {
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 600;
  border: 1.5px solid var(--border);
  background: var(--card);
  color: var(--text-light);
  white-space: nowrap;
  cursor: pointer;
  transition: all 0.2s;
}
.chip.active { background: var(--primary); color: white; border-color: var(--primary); }

/* Stats bar */
.stats-bar {
  display: flex;
  gap: 12px;
  padding: 12px 16px;
}
.stat-card {
  flex: 1;
  background: var(--card);
  border-radius: 12px;
  padding: 12px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat-card .num { font-size: 22px; font-weight: 800; color: var(--primary); }
.stat-card .label { font-size: 11px; color: var(--text-light); margin-top: 2px; }

/* Swipe hint */
.swipe-hint {
  font-size: 11px;
  color: var(--text-light);
  text-align: center;
  padding: 4px;
  opacity: 0.6;
}

/* Assignee */
.assignee-select {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 4px;
}
.assignee-btn {
  padding: 8px 12px;
  border: 1.5px solid var(--border);
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  background: var(--bg);
  color: var(--text-light);
  transition: all 0.2s;
  display: flex;
  align-items: center;
  gap: 6px;
}
.assignee-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
.assignee-btn .avatar {
  width: 20px;
  height: 20px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 10px;
  font-weight: 700;
  color: white;
  flex-shrink: 0;
}
.avatar-rv { background: #FF6B6B; }
.avatar-mn { background: #6C63FF; }
.avatar-en { background: #51CF66; }
.avatar-me { background: #FFD43B; color: #333; }

.task-assignee {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  background: var(--bg);
  padding: 2px 8px 2px 2px;
  border-radius: 12px;
}
.task-assignee .avatar {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  font-weight: 700;
  color: white;
}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <h1>Task Manager</h1>
      <div class="date-display" id="headerDate"></div>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" data-view="calendar">Calendar</button>
  <button class="tab" data-view="tasks">Toate</button>
</div>

<!-- Calendar View -->
<div class="view active" id="view-calendar">
  <div class="calendar-container">
    <div class="calendar-nav">
      <button id="prevMonth">&larr;</button>
      <span class="month-year" id="monthYear"></span>
      <button id="nextMonth">&rarr;</button>
    </div>
    <div class="calendar-grid" id="calendarGrid"></div>
  </div>
  <div class="task-section" id="dayTasks">
    <div class="section-title" id="dayTasksTitle"></div>
    <div id="dayTasksList"></div>
  </div>
</div>

<!-- All Tasks View -->
<div class="view" id="view-tasks">
  <div class="stats-bar">
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="label">Total</div></div>
    <div class="stat-card"><div class="num" id="statPending">0</div><div class="label">De facut</div></div>
    <div class="stat-card"><div class="num" id="statDone">0</div><div class="label">Gata</div></div>
  </div>
  <div class="filter-row">
    <button class="chip active" data-filter="all">Toate</button>
    <button class="chip" data-filter="pending">De facut</button>
    <button class="chip" data-filter="done">Finalizate</button>
    <button class="chip" data-filter="high">Urgente</button>
    <button class="chip" data-filter="Radu Vladascau">Radu</button>
    <button class="chip" data-filter="Madalina Nistor">Madalina</button>
    <button class="chip" data-filter="Ezgi Nalbant">Ezgi</button>
  </div>
  <div class="task-section">
    <div id="allTasksList"></div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="addBtn">+</button>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Task nou</h2>
    <label>Titlu</label>
    <input type="text" id="taskTitleInput" placeholder="Ce ai de facut?" autocomplete="off">
    <label>Descriere (optional)</label>
    <textarea id="taskDescInput" placeholder="Detalii..." rows="2"></textarea>
    <label>Data</label>
    <input type="date" id="taskDateInput">
    <label>Ora (optional)</label>
    <input type="time" id="taskTimeInput">
    <label>Prioritate</label>
    <div class="priority-select">
      <button class="priority-btn" data-priority="high">Urgent</button>
      <button class="priority-btn active-medium" data-priority="medium">Normal</button>
      <button class="priority-btn" data-priority="low">Scazut</button>
    </div>
    <label>Asignat la</label>
    <div class="assignee-select" id="assigneeSelect">
      <button class="assignee-btn" data-assignee="Radu Vladascau"><span class="avatar avatar-rv">RV</span>Radu</button>
      <button class="assignee-btn" data-assignee="Madalina Nistor"><span class="avatar avatar-mn">MN</span>Madalina</button>
      <button class="assignee-btn" data-assignee="Ezgi Nalbant"><span class="avatar avatar-en">EN</span>Ezgi</button>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="cancelBtn">Anuleaza</button>
      <button class="btn btn-primary" id="saveBtn">Salveaza</button>
    </div>
  </div>
</div>

<script>
// ---- State ----
let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
let currentMonth = new Date().getMonth();
let currentYear = new Date().getFullYear();
let selectedDate = formatDate(new Date());
let currentFilter = 'all';
let editingTaskId = null;

const MONTHS_RO = ['Ianuarie','Februarie','Martie','Aprilie','Mai','Iunie','Iulie','August','Septembrie','Octombrie','Noiembrie','Decembrie'];
const DAYS_RO = ['Lu','Ma','Mi','Jo','Vi','Sa','Du'];

const TEAM = [
  { name: 'Radu Vladascau', short: 'Radu', initials: 'RV', css: 'avatar-rv' },
  { name: 'Madalina Nistor', short: 'Madalina', initials: 'MN', css: 'avatar-mn' },
  { name: 'Ezgi Nalbant', short: 'Ezgi', initials: 'EN', css: 'avatar-en' },
];

// ---- Helpers ----
function formatDate(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function formatDisplayDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.getDate() + ' ' + MONTHS_RO[d.getMonth()] + ' ' + d.getFullYear();
}
function saveTasks() {
  localStorage.setItem('tasks', JSON.stringify(tasks));
}
function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2,6);
}

// ---- Calendar ----
function renderCalendar() {
  const grid = document.getElementById('calendarGrid');
  grid.innerHTML = '';
  document.getElementById('monthYear').textContent = MONTHS_RO[currentMonth] + ' ' + currentYear;

  DAYS_RO.forEach(d => {
    const el = document.createElement('div');
    el.className = 'day-name';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(currentYear, currentMonth, 1);
  let startDay = firstDay.getDay() - 1;
  if (startDay < 0) startDay = 6;

  const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  const prevDays = new Date(currentYear, currentMonth, 0).getDate();
  const today = formatDate(new Date());

  // Task dates for dots
  const taskDates = new Set(tasks.filter(t => !t.done).map(t => t.date));

  for (let i = 0; i < startDay; i++) {
    const el = document.createElement('div');
    el.className = 'day other-month';
    el.textContent = prevDays - startDay + 1 + i;
    grid.appendChild(el);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const el = document.createElement('div');
    const dateStr = currentYear + '-' + String(currentMonth+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
    el.className = 'day';
    if (dateStr === today) el.classList.add('today');
    if (dateStr === selectedDate) el.classList.add('selected');
    el.textContent = d;

    if (taskDates.has(dateStr)) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      el.appendChild(dot);
    }

    el.addEventListener('click', () => {
      selectedDate = dateStr;
      renderCalendar();
      renderDayTasks();
    });
    grid.appendChild(el);
  }

  const totalCells = startDay + daysInMonth;
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    const el = document.createElement('div');
    el.className = 'day other-month';
    el.textContent = i;
    grid.appendChild(el);
  }
}

function renderDayTasks() {
  const title = document.getElementById('dayTasksTitle');
  const list = document.getElementById('dayTasksList');
  title.textContent = formatDisplayDate(selectedDate);

  const dayTasks = tasks.filter(t => t.date === selectedDate)
    .sort((a,b) => (a.done ? 1 : 0) - (b.done ? 1 : 0) || priorityWeight(a.priority) - priorityWeight(b.priority) || (a.time || 'zz').localeCompare(b.time || 'zz'));

  if (dayTasks.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">&#128467;</div><p>Niciun task pentru aceasta zi</p></div>';
    return;
  }
  list.innerHTML = dayTasks.map(t => taskCardHTML(t)).join('');
  attachTaskEvents(list);
}

// ---- All Tasks ----
function renderAllTasks() {
  const list = document.getElementById('allTasksList');
  let filtered = [...tasks];

  if (currentFilter === 'pending') filtered = filtered.filter(t => !t.done);
  else if (currentFilter === 'done') filtered = filtered.filter(t => t.done);
  else if (currentFilter === 'high') filtered = filtered.filter(t => t.priority === 'high' && !t.done);
  else if (TEAM.some(m => m.name === currentFilter)) filtered = filtered.filter(t => t.assignee === currentFilter);

  filtered.sort((a,b) => (a.done ? 1 : 0) - (b.done ? 1 : 0) || a.date.localeCompare(b.date) || priorityWeight(a.priority) - priorityWeight(b.priority));

  // Stats
  document.getElementById('statTotal').textContent = tasks.length;
  document.getElementById('statPending').textContent = tasks.filter(t => !t.done).length;
  document.getElementById('statDone').textContent = tasks.filter(t => t.done).length;

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="icon">&#9989;</div><p>Niciun task</p></div>';
    return;
  }
  list.innerHTML = filtered.map(t => taskCardHTML(t, true)).join('');
  attachTaskEvents(list);
}

function priorityWeight(p) {
  return p === 'high' ? 0 : p === 'medium' ? 1 : 2;
}

function getAssigneeInfo(name) {
  return TEAM.find(m => m.name === name);
}

function assigneeBadgeHTML(name) {
  const m = getAssigneeInfo(name);
  if (!m) return '';
  return `<span class="task-assignee"><span class="avatar ${m.css}">${m.initials}</span>${m.short}</span>`;
}

function taskCardHTML(t, showDate = false) {
  const timeStr = t.time ? t.time : '';
  const dateStr = showDate ? formatDisplayDate(t.date) : '';
  const meta = [timeStr, dateStr].filter(Boolean).join(' &middot; ');
  const assigneeHTML = t.assignee ? assigneeBadgeHTML(t.assignee) : '';
  return `
    <div class="task-card ${t.done ? 'done' : ''}" data-id="${t.id}">
      <div class="task-check ${t.done ? 'checked' : ''}" data-action="toggle" data-id="${t.id}"></div>
      <div class="task-info" data-action="edit" data-id="${t.id}">
        <div class="task-title">${escapeHTML(t.title)}</div>
        <div class="task-meta">
          <span class="priority-dot ${t.priority}"></span>
          ${meta ? `<span>${meta}</span>` : ''}
          ${assigneeHTML}
          ${t.desc ? `<span>${escapeHTML(t.desc).substring(0,40)}</span>` : ''}
        </div>
      </div>
      <button class="task-delete" data-action="delete" data-id="${t.id}">&times;</button>
    </div>`;
}

function escapeHTML(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function attachTaskEvents(container) {
  container.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const id = el.dataset.id;
      const action = el.dataset.action;
      if (action === 'toggle') toggleTask(id);
      else if (action === 'delete') deleteTask(id);
      else if (action === 'edit') openEditModal(id);
    });
  });
}

// ---- Actions ----
function toggleTask(id) {
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; saveTasks(); renderAll(); }
}

function deleteTask(id) {
  tasks = tasks.filter(t => t.id !== id);
  saveTasks();
  renderAll();
}

// ---- Modal ----
const overlay = document.getElementById('modalOverlay');

function openModal() {
  editingTaskId = null;
  document.getElementById('modalTitle').textContent = 'Task nou';
  document.getElementById('taskTitleInput').value = '';
  document.getElementById('taskDescInput').value = '';
  document.getElementById('taskDateInput').value = selectedDate;
  document.getElementById('taskTimeInput').value = '';
  setPriority('medium');
  setAssignee('');
  overlay.classList.add('active');
  setTimeout(() => document.getElementById('taskTitleInput').focus(), 300);
}

function openEditModal(id) {
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  editingTaskId = id;
  document.getElementById('modalTitle').textContent = 'Editeaza task';
  document.getElementById('taskTitleInput').value = t.title;
  document.getElementById('taskDescInput').value = t.desc || '';
  document.getElementById('taskDateInput').value = t.date;
  document.getElementById('taskTimeInput').value = t.time || '';
  setPriority(t.priority);
  setAssignee(t.assignee || '');
  overlay.classList.add('active');
  setTimeout(() => document.getElementById('taskTitleInput').focus(), 300);
}

function closeModal() {
  overlay.classList.remove('active');
}

function saveTask() {
  const title = document.getElementById('taskTitleInput').value.trim();
  if (!title) { document.getElementById('taskTitleInput').focus(); return; }

  const data = {
    title,
    desc: document.getElementById('taskDescInput').value.trim(),
    date: document.getElementById('taskDateInput').value,
    time: document.getElementById('taskTimeInput').value,
    priority: currentPriority,
    assignee: currentAssignee,
  };

  if (editingTaskId) {
    const t = tasks.find(t => t.id === editingTaskId);
    if (t) Object.assign(t, data);
  } else {
    tasks.push({ id: genId(), done: false, ...data });
  }

  saveTasks();
  closeModal();
  // Switch selected date to task date
  selectedDate = data.date;
  renderAll();
}

let currentPriority = 'medium';
let currentAssignee = '';

function setPriority(p) {
  currentPriority = p;
  document.querySelectorAll('.priority-btn').forEach(btn => {
    btn.className = 'priority-btn' + (btn.dataset.priority === p ? ' active-' + p : '');
  });
}

function setAssignee(name) {
  currentAssignee = currentAssignee === name ? '' : name;
  document.querySelectorAll('.assignee-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.assignee === currentAssignee);
  });
}

// ---- Events ----
document.getElementById('addBtn').addEventListener('click', openModal);
document.getElementById('cancelBtn').addEventListener('click', closeModal);
document.getElementById('saveBtn').addEventListener('click', saveTask);
overlay.addEventListener('click', e => { if (e.target === overlay) closeModal(); });

document.getElementById('prevMonth').addEventListener('click', () => {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  renderCalendar();
});
document.getElementById('nextMonth').addEventListener('click', () => {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  renderCalendar();
});

// Tabs
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById('view-' + tab.dataset.view).classList.add('active');
    renderAll();
  });
});

// Filters
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    renderAllTasks();
  });
});

// Priority buttons
document.querySelectorAll('.priority-btn').forEach(btn => {
  btn.addEventListener('click', () => setPriority(btn.dataset.priority));
});

// Assignee buttons
document.querySelectorAll('.assignee-btn').forEach(btn => {
  btn.addEventListener('click', () => setAssignee(btn.dataset.assignee));
});

// Enter key in title input
document.getElementById('taskTitleInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') saveTask();
});

// ---- Render ----
function renderAll() {
  renderCalendar();
  renderDayTasks();
  renderAllTasks();
}

// Header date
document.getElementById('headerDate').textContent = formatDisplayDate(formatDate(new Date()));

// Init
renderAll();

// ---- Service Worker Registration ----
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
