name: kuziini_app
description: Kuziini Task Manager - Premium Mobile-First Task Management
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Supabase
  supabase_flutter: ^2.5.0

  # UI
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  google_fonts: ^6.2.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.3.3
  timeago: ^3.7.0
  image_picker: ^1.0.7
  file_picker: ^8.0.0+1
  path_provider: ^2.1.2
  url_launcher: ^6.2.5
  share_plus: ^9.0.0

  # Notifications
  firebase_core: ^2.27.0
  firebase_messaging: ^14.7.15
  flutter_local_notifications: ^17.1.0

  # Storage
  shared_preferences: ^2.2.2

  # Icons
  phosphor_flutter: ^2.1.0

  # Haptic
  vibration: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.8
  json_serializable: ^6.7.1
  json_annotation: ^4.8.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
