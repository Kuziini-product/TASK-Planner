<!DOCTYPE html>
<html>
<head>
  <base href="/">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Kuziini Task Manager">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Kuziini">

  <title>Kuziini</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin: 0; background: #ffffff; }
  </style>
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
  <script>
    // Re-enable pinch-to-zoom after Flutter loads (Flutter overrides viewport)
    window.addEventListener('load', function() {
      setTimeout(function() {
        var viewport = document.querySelector('meta[name="viewport"]');
        if (viewport) {
          viewport.setAttribute('content', 'width=device-width, initial-scale=1.0, minimum-scale=0.5, maximum-scale=3.0, user-scalable=yes');
        }
      }, 2000);
    });
  </script>
</body>
</html>
